<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open This ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="gradient-bg">

<h1 class="main-title">A Letter For You 💌</h1>

<!-- Envelope Section -->
<div id="envelopeSection" class="envelope-container">
    <div class="envelope" onclick="openLetter()">💌</div>
    <p>Click the letter to open it</p>
</div>

<!-- Letter Content -->
<div id="letterContent" class="hidden letter-box">

    <h2>24 June 2025 ❤️</h2>
    <p>
        We first talked on 24 June 2025…  
        And that day changed everything for me.
    </p>

    <h3>Time Since We First Talked:</h3>
    <div id="timer" class="timer"></div>

    <hr>

    <p id="typedText"></p>

    

</div>

<script>

const message = `
I am so sorry for whatever I did.
I don't even know what I did, but I apologize from the bottom of my heart.

And one more sorry for whatever I said on the call.

I know you will forgive me because I am your cute little girl… yes na? 🥺

I want you back just like old Karan.
I don't want this Karan.
I want my sweet Karan.
`;

function openLetter(){
    document.getElementById("envelopeSection").style.display = "none";
    document.getElementById("letterContent").classList.remove("hidden");
    typeWriter();
}

let i = 0;
function typeWriter(){
    if(i < message.length){
        document.getElementById("typedText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

/* Timer */
const startDate = new Date("June 24, 2025 00:00:00");

function updateTimer(){
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("timer").innerHTML =
        days + " Days " + hours + " Hours " + minutes + " Minutes ❤️";
}

setInterval(updateTimer, 1000);

</script>

</body>
</html>
