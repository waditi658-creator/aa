<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Karan ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="gradient-bg">

<div class="center-box">

    <h1 class="main-title">Karan… 🥺</h1>
    <p class="subtitle">I am so so so so so Sorry?</p>

    <div class="emoji">💔 ➝ ❤️</div>

    <div class="button-group">
        <button class="btn yes-btn" onclick="goNext()">It’s OK</button>
        <button class="btn no-btn" onclick="goToSecond()">It’s Not OK</button>
    </div>

</div>

<script>
function goNext(){
    window.location.href = "promise.html";
}

function goToSecond(){
    document.body.innerHTML = `
    <div class="center-box">
        <h1 class="main-title">Please Think Again 🥺</h1>
        <p class="subtitle">I really don’t want to lose you...</p>
        <div class="button-group">
            <button class="btn yes-btn" onclick="goNext()">It’s OK</button>
            <button class="btn no-btn" id="runBtn">It’s Not OK</button>
        </div>
    </div>
    `;

    const runBtn = document.getElementById("runBtn");
    runBtn.addEventListener("mouseover", function(){
        runBtn.style.position = "absolute";
        runBtn.style.left = Math.random() * (window.innerWidth - 150) + "px";
        runBtn.style.top = Math.random() * (window.innerHeight - 150) + "px";
    });
}
</script>

</body>
</html>
